<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Briefing</title>
<style>
  :root {
    --bg: #fafafa;
    --card: #ffffff;
    --border: #e6e6e6;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #1a56db;
    --accent-soft: #eaf0ff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #131313;
      --card: #1f1f1f;
      --border: #2c2c2c;
      --text: #ececec;
      --muted: #9a9a9a;
      --accent: #6ea8ff;
      --accent-soft: #1c2a47;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 28px 18px 60px; }
  header h1 {
    font-size: 1.45rem;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .meta { color: var(--muted); font-size: .9rem; margin-bottom: 22px; }
  .briefings {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .briefings button {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: .88rem;
    font-family: inherit;
  }
  .briefings button:hover { border-color: var(--accent); }
  .briefings button.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .topic {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 14px;
  }
  .topic h2 {
    font-size: 1.05rem;
    margin: 0 0 8px;
    letter-spacing: -0.005em;
  }
  .topic .summary {
    margin: 0 0 12px;
    color: var(--text);
  }
  .topic ul.highlights {
    margin: 0 0 14px;
    padding-left: 20px;
  }
  .topic ul.highlights li { margin-bottom: 4px; }
  .articles { border-top: 1px solid var(--border); padding-top: 10px; }
  .articles a {
    display: block;
    padding: 8px 0;
    text-decoration: none;
    color: var(--accent);
    font-size: .94rem;
    border-bottom: 1px solid var(--border);
  }
  .articles a:last-child { border-bottom: none; }
  .articles a:hover { background: var(--accent-soft); margin: 0 -10px; padding: 8px 10px; border-radius: 6px; }
  .articles .source { color: var(--muted); font-size: .78rem; display: block; margin-top: 2px; }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
    background: var(--card);
    border: 1px dashed var(--border);
    border-radius: 12px;
  }
  footer {
    margin-top: 36px;
    text-align: center;
    color: var(--muted);
    font-size: .8rem;
  }
  footer a { color: inherit; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Briefing</h1>
      <div class="meta" id="meta">Laedt …</div>
    </header>
    <nav class="briefings" id="briefings"></nav>
    <main id="content"></main>
    <footer>Aktualisiert sich automatisch · Themen aendern in <code>themen.yml</code></footer>
  </div>

<script>
const fmt = (s) => {
  const d = new Date(s + "T00:00:00");
  return d.toLocaleDateString("de-DE", { weekday: "short", day: "2-digit", month: "short" });
};

const labelMode = (m) => m === "taeglich" ? "Tag" : "Woche";

async function loadIndex() {
  const r = await fetch("data/index.json", { cache: "no-store" });
  if (!r.ok) throw new Error("index.json nicht gefunden");
  return r.json();
}

async function loadBriefing(file) {
  const r = await fetch("data/briefings/" + file, { cache: "no-store" });
  return r.json();
}

function renderBriefing(briefing) {
  const c = document.getElementById("content");
  c.innerHTML = "";
  if (!briefing.topics || briefing.topics.length === 0) {
    c.innerHTML = '<div class="empty">Heute keine Treffer in deinen Themen. Tipp: Quellen oder Keywords in <code>themen.yml</code> erweitern.</div>';
    return;
  }
  briefing.topics.forEach((t) => {
    const card = document.createElement("article");
    card.className = "topic";
    const summary = t.summary ? `<p class="summary">${escapeHtml(t.summary)}</p>` : "";
    const hl = (t.highlights && t.highlights.length)
      ? `<ul class="highlights">${t.highlights.map(h => `<li>${escapeHtml(h)}</li>`).join("")}</ul>`
      : "";
    const articles = (t.items || []).map(it =>
      `<a href="${escapeAttr(it.link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(it.title)}<span class="source">${escapeHtml(it.source || "")}</span></a>`
    ).join("");
    card.innerHTML = `<h2>${escapeHtml(t.name)}</h2>${summary}${hl}<div class="articles">${articles}</div>`;
    c.appendChild(card);
  });
}

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

async function init() {
  const meta = document.getElementById("meta");
  const nav = document.getElementById("briefings");
  let idx;
  try { idx = await loadIndex(); }
  catch {
    document.getElementById("content").innerHTML = '<div class="empty">Noch kein Briefing erzeugt. Sobald der Workflow laeuft, erscheint hier das erste.</div>';
    meta.textContent = "";
    return;
  }
  if (!idx.length) {
    document.getElementById("content").innerHTML = '<div class="empty">Noch kein Briefing erzeugt. Sobald der Workflow laeuft, erscheint hier das erste.</div>';
    meta.textContent = "";
    return;
  }
  meta.textContent = `${idx.length} Briefings im Archiv · neuestes ${fmt(idx[0].date)}`;
  idx.slice(0, 21).forEach((b, i) => {
    const btn = document.createElement("button");
    btn.textContent = `${fmt(b.date)} · ${labelMode(b.mode)}`;
    btn.onclick = async () => {
      [...nav.children].forEach(c => c.classList.remove("active"));
      btn.classList.add("active");
      const data = await loadBriefing(b.file);
      renderBriefing(data);
    };
    if (i === 0) {
      btn.classList.add("active");
      loadBriefing(b.file).then(renderBriefing);
    }
    nav.appendChild(btn);
  });
}
init();
</script>
</body>
</html>
