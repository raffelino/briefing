name: Briefing

on:
  schedule:
    # Werktags 07:00 Berlin (Sommer) / 06:00 Winter — UTC 05:00
    - cron: "0 5 * * 1-5"
    # Samstag 09:00 Berlin (Sommer) / 08:00 Winter — UTC 07:00
    - cron: "0 7 * * 6"
  push:
    branches: [main]
    # Bei Bot-Commits in web/data/ NICHT triggern (vermeidet Loop).
    paths-ignore:
      - "web/data/**"
  workflow_dispatch:
    inputs:
      mode:
        description: "Welcher Briefing-Typ soll laufen?"
        required: true
        default: taeglich
        type: choice
        options:
          - taeglich
          - woechentlich

permissions:
  contents: write   # darf das Briefing zurueck ins Repo committen
  models: read      # darf GitHub Models (LLM) aufrufen

concurrency:
  group: briefing
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/requirements.txt

      - name: Abhaengigkeiten installieren
        run: pip install -r agent/requirements.txt

      - name: Modus bestimmen
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 7 * * 6" ]; then
            echo "mode=woechentlich" >> "$GITHUB_OUTPUT"
          else
            echo "mode=taeglich" >> "$GITHUB_OUTPUT"
          fi

      - name: Briefing erzeugen
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python agent/briefing.py "${{ steps.mode.outputs.mode }}"

      - name: Aenderungen committen
        run: |
          git config user.name  "briefing-agent[bot]"
          git config user.email "briefing-agent@users.noreply.github.com"
          git add web/data/
          if git diff --cached --quiet; then
            echo "Keine Aenderungen — nichts zu committen."
          else
            git commit -m "Briefing $(date -u +%F) (${{ steps.mode.outputs.mode }})"
            git push
          fi
